name: Deployment
on: [push, workflow_dispatch]
concurrency:
  group: plogon-deploy
  cancel-in-progress: true

# FFXIVPlugins fork:
#   - All checkouts repointed at puppyprogrammer/* forks.
#   - The "Signal XLWeb" step targets ffxivplugins.commslink.net.
#   - All optional infra (S3 build-history, Discord webhooks, plugin
#     signing, internal S3) is dropped. Plogon degrades gracefully —
#     we lose the build-history archive and signing, that's fine for v1.

jobs:
  run-plogon:
    name: Build Plugins
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - name: Checkout manifests
      uses: actions/checkout@v4
      with:
        repository: puppyprogrammer/DalamudPluginsD17
        path: manifests
        ref: ${{ github.sha }}
        fetch-depth: 0

    - name: Setup Difftastic
      run: |
        wget https://github.com/Wilfred/difftastic/releases/latest/download/difft-x86_64-unknown-linux-gnu.tar.gz
        tar -xzf difft-x86_64-unknown-linux-gnu.tar.gz
        sudo mv difft /usr/local/bin/difft
        sudo chmod +x /usr/local/bin/difft
        difft --version

    - name: Checkout Plogon
      uses: actions/checkout@v4
      with:
        repository: puppyprogrammer/Plogon
        path: Plogon

    - name: Checkout Dist
      uses: actions/checkout@v4
      with:
        repository: puppyprogrammer/PluginDistD17
        path: output
        ssh-key: ${{ secrets.DIST_SSH_KEY }}
        persist-credentials: true
        ref: main

    - name: Create required folders
      run: |
        mkdir artifacts
        mkdir work

    - name: Run Plogon
      working-directory: Plogon/Plogon
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        XLWEB_KEY: ${{ secrets.XLWEB_KEY }}
      run: |
        dotnet run -- \
          --manifest-folder="${{ github.workspace }}/manifests" \
          --master-manifest-folder="${{ github.workspace }}/manifests" \
          --output-folder="${{ github.workspace }}/output" \
          --work-folder="${{ github.workspace }}/work" \
          --static-folder="${{ github.workspace }}/Plogon/Plogon/static" \
          --artifact-folder="${{ github.workspace }}/artifacts" \
          --build-overrides-file="${{ github.workspace }}/manifests/overrides.toml" \
          --ci --mode=Commit --build-all

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: plugin-artifact
        path: artifacts

    - name: Commit files
      continue-on-error: true
      working-directory: output
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "FFXIVPlugins Plogon"
        git add .
        git commit -m "Update distribute (${{ github.sha }})"

    - name: Push plugin dist
      uses: ad-m/github-push-action@master
      with:
        directory: output
        repository: puppyprogrammer/PluginDistD17
        ssh: true
        branch: main

    - name: Signal XLWeb commit
      run: |
        curl --request POST \
          --url https://ffxivplugins.commslink.net/Plogon/CommitStagedPlugins \
          --header "X-XL-Key: ${{ secrets.XLWEB_KEY }}" \
          --fail-with-body
